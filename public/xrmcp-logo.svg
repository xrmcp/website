<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="xrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.49 0 0 0 0.49
                0.44 0 0 0 0.44
                0.97 0 0 0 0.97
                0    0 0 1  0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#0f1117"/>
  <g
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="132"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-2"
  >
    <text x="140" y="300" fill="url(#xrGrad)">xr</text>
    <text fill="#ffffff" x="340" y="300">MCP</text>
  </g>
  <rect x="56" y="310" width="400" height="7" rx="3.5" fill="url(#barGrad)"/>
</svg>
